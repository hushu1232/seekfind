# ============================================================
#  求问 — Docker Compose 编排文件
# ============================================================
#  服务：
#    bff     — 后端 BFF 服务（FastAPI + LangGraph Agent）
#    chroma  — Chroma 向量数据库
#
#  启动：docker compose up -d
#  停止：docker compose down
#  日志：docker compose logs -f bff
#  重建：docker compose up -d --build
#
#  网络：
#    bff 通过服务名 "chroma" 访问向量库（端口 8000）
#    bff 通过 host.docker.internal 访问宿主机 Ollama（端口 11434）
# ============================================================

services:
  # --- 后端 BFF 服务 ---
  bff:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qiuwen-bff
    ports:
      - "${BFF_PORT:-8700}:8700"
    environment:
      # 服务端口
      - BFF_PORT=8700
      # Ollama 连接（host.docker.internal 指向宿主机）
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      # Chroma 连接（服务名解析）
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      # 模型策略
      - MODEL_STRATEGY=${MODEL_STRATEGY:-hybrid}
      - CLOUD_API_BASE_URL=${CLOUD_API_BASE_URL:-}
      - CLOUD_API_KEY=${CLOUD_API_KEY:-}
      - CLOUD_MODEL=${CLOUD_MODEL:-gpt-4o-mini}
      - FALLBACK_THRESHOLD=${FALLBACK_THRESHOLD:-3}
      # 日志
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # 内置常识库（只读挂载）
      - ./backend/knowledge:/app/knowledge:ro
    depends_on:
      chroma:
        condition: service_healthy
    # host.docker.internal 支持（Linux 需要 extra_hosts）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8700/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Chroma 向量数据库 ---
  chroma:
    image: chromadb/chroma:latest
    container_name: qiuwen-chroma
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      # 持久化存储（重启不丢失）
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# 持久化卷
volumes:
  chroma_data:

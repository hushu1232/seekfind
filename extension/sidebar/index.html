<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求问</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="header">
    <span>🔮</span>
    <h1>求问</h1>
    <div class="header-actions">
      <button id="diagnostic-btn" class="header-btn" title="系统诊断">🔍</button>
      <div class="status" id="ws-status"></div>
    </div>
  </div>

  <div id="welcome-container"></div>

  <div id="ball-container"></div>

  <div class="messages" id="messages">
    <div class="message assistant">👋 你好！我是求问，你的网页引导助手。有什么想问的？</div>
  </div>

  <div class="input-area">
    <button id="record-btn" class="record-btn" title="录制操作流">⏺ 录制</button>
    <input type="text" id="user-input" placeholder="输入你的问题..." autocomplete="off">
    <button id="send-btn">发送</button>
  </div>

  <script type="module" src="./panel.ts"></script>
</body>
</html>
